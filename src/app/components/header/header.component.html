<header class="bg-white/80 backdrop-blur-lg border-b border-slate-100 fixed top-0 left-0 right-0 z-50 transition-all duration-300">
  <nav class="container mx-auto px-6 py-4">
    <div class="flex items-center justify-between">
      <a routerLink="/" class="flex items-center group" (click)="closeMenus()">
        <img src="assets/logo.svg" alt="XLG Solutions Logo" class="h-9 w-auto group-hover:opacity-90 transition-opacity">
      </a>
      
      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8 font-medium">
        <a routerLink="/" class="text-slate-600 hover:text-blue-600 transition-colors py-2">Home</a>
        
        <div class="relative">
          <button (click)="toggleServicesMenu()" class="text-slate-600 hover:text-blue-600 transition-colors flex items-center py-2 focus:outline-none">
            Services
            <svg class="w-4 h-4 ml-1 transform transition-transform duration-200" [class.rotate-180]="servicesMenuOpen()" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>
          
          @if(servicesMenuOpen()) {
            <div class="absolute right-0 md:left-0 mt-2 w-64 bg-white/95 backdrop-blur-md rounded-xl shadow-xl border border-slate-100 z-50 py-2 transition-all duration-200 ease-out origin-top-left animate-in fade-in slide-in-from-top-2">
              @for(service of services; track service.id) {
                <a [routerLink]="['/service', service.id]" (click)="closeMenus()" class="block px-4 py-2.5 text-sm text-slate-700 hover:text-blue-600 hover:bg-slate-50 transition-all font-medium">
                  {{ service.name }}
                </a>
              }
            </div>
          }
        </div>
        
        <a routerLink="/" fragment="testimonials" class="text-slate-600 hover:text-blue-600 transition-colors py-2">Testimonials</a>
        <a routerLink="/" fragment="contact" class="px-5 py-2.5 text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm hover:shadow-md transition-all font-semibold">
          Contact
        </a>
      </div>
      
      <!-- Mobile Toggle -->
      <div class="md:hidden">
        <button (click)="toggleMenu()" class="text-slate-600 focus:outline-none hover:text-blue-600 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="menuOpen() ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16m-7 6h7'"></path>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- Mobile Navigation Menu -->
    @if (menuOpen()) {
      <div class="md:hidden mt-4 bg-white/95 backdrop-blur-md rounded-xl border border-slate-100 p-4 space-y-2 shadow-lg animate-in fade-in slide-in-from-top-4">
        <a routerLink="/" (click)="closeMenus()" class="block py-2 text-slate-600 hover:text-blue-600 transition-colors font-medium border-b border-slate-50">Home</a>
        <div class="py-1">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-2 py-1">Services</p>
          @for(service of services; track service.id) {
            <a [routerLink]="['/service', service.id]" (click)="closeMenus()" class="block py-2 px-3 text-sm text-slate-700 hover:text-blue-600 hover:bg-slate-50 rounded-lg transition-colors font-medium">
              {{ service.name }}
            </a>
          }
        </div>
        <a routerLink="/" fragment="testimonials" (click)="closeMenus()" class="block py-2 text-slate-600 hover:text-blue-600 transition-colors font-medium border-t border-slate-50">Testimonials</a>
        <a routerLink="/" fragment="contact" (click)="closeMenus()" class="block mt-4 text-center px-4 py-2.5 text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-all font-semibold">
          Contact
        </a>
      </div>
    }
  </nav>
</header>
